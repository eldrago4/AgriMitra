server {
    listen 80;
    server_name 1ved.cloud www.1ved.cloud;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name 1ved.cloud www.1ved.cloud;

    ssl_certificate     /etc/letsencrypt/live/1ved.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/1ved.cloud/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # CORS headers
    add_header 'Access-Control-Allow-Origin'  '*'         always;
    add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
    add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;

    location /infer {
        proxy_pass         http://infer:8001/infer;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 60s;

        if ($request_method = OPTIONS) {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'POST, OPTIONS';
            add_header 'Access-Control-Allow-Headers' 'Content-Type';
            return 204;
        }
    }

    location /health {
        proxy_pass http://infer:8001/health;
    }

    location /docs {
        proxy_pass http://infer:8001/docs;
    }
}
